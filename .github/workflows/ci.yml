name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-and-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: swaraj
          POSTGRES_PASSWORD: swaraj
          POSTGRES_DB: swaraj_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://swaraj:swaraj@localhost:5432/swaraj_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @swaraj/backend prisma:generate
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter @swaraj/backend exec prisma migrate deploy
      - run: pnpm --filter @swaraj/backend test:integration
      - run: pnpm build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: apps/mobile
        run: flutter pub get
      - working-directory: apps/mobile
        run: flutter analyze
      - working-directory: apps/mobile
        run: flutter test
      - name: Build Release APK
        working-directory: apps/mobile
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
