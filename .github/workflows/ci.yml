name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Backend + Admin (lint, test, build) ─────────────────────────────────────
  web-and-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: swaraj
          POSTGRES_PASSWORD: swaraj
          POSTGRES_DB: swaraj_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://swaraj:swaraj@localhost:5432/swaraj_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters-long
      # Required for admin Next.js build
      NEXT_PUBLIC_API_URL: https://swaraj-backend-dkgn.onrender.com/api
      AUTH_SECRET: ci-nextauth-secret-minimum-32-characters-long-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @swaraj/backend prisma:generate
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter @swaraj/backend exec prisma migrate deploy
      - run: pnpm --filter @swaraj/backend test:integration
      - run: pnpm build

  # ── Flutter Android ──────────────────────────────────────────────────────────
  mobile-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze
      - name: Test
        working-directory: apps/mobile
        run: flutter test
      - name: Decode keystore
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/mobile/android/app/swaraj-release.jks
      - name: Write key.properties
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cat > apps/mobile/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=swaraj-release.jks
          EOF
      - name: Build Release APK (PRs / debug signing)
        if: github.event_name == 'pull_request'
        working-directory: apps/mobile
        run: |
          flutter build apk --release \
            --dart-define=API_URL=https://swaraj-backend-dkgn.onrender.com/api \
            --dart-define=SUPABASE_URL=https://mocwoshzlcbwbjgsdctd.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - name: Build Release AAB (main branch — Play Store)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: apps/mobile
        run: |
          flutter build appbundle --release \
            --dart-define=API_URL=https://swaraj-backend-dkgn.onrender.com/api \
            --dart-define=SUPABASE_URL=https://mocwoshzlcbwbjgsdctd.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - name: Upload APK artifact (PRs)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
      - name: Upload AAB artifact (main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab

  # ── Flutter iOS ──────────────────────────────────────────────────────────────
  mobile-ios:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install
      - name: Build iOS (no-codesign — CI artifact only)
        working-directory: apps/mobile
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_URL=https://swaraj-backend-dkgn.onrender.com/api \
            --dart-define=SUPABASE_URL=https://mocwoshzlcbwbjgsdctd.supabase.co \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-unsigned
          path: apps/mobile/build/ios/iphoneos/Runner.app
