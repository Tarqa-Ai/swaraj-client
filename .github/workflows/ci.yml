name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mobile-android:
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze
      - name: Test
        working-directory: apps/mobile
        run: flutter test
      - name: Decode keystore
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/mobile/android/app/swaraj-release.jks
      - name: Write key.properties
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          cat > apps/mobile/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=swaraj-release.jks
          EOF
      - name: Build APK
        working-directory: apps/mobile
        run: |
          flutter build apk --release \
            --dart-define=API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
